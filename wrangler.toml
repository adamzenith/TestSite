name = "cv-site"
main = "src/index.js"
compatibility_date = "2024-01-01"

[assets]
directory = "./public"

[[rules]]
type = "Text"
globs = ["**/*.html", "**/*.css"]
fallthrough = true

[[rules]]
type = "Data"
globs = ["**/*.png", "**/*.jpg", "**/*.jpeg"]
fallthrough = true

[env.production]
name = "cv-site"

[env.staging]
name = "cv-site-staging"