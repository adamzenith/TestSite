<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{{title}}</title>
        <link rel="stylesheet" type="text/css" href="/readable.min.css?v={{readableVersion}}" />
        <link rel="stylesheet" type="text/css" href="/styles.css?v={{stylesVersion}}" />
    </head>
    <body>
        <header>
            <div class="profile-header">
                <img
                    class="profile-photo"
                    src="{{photo}}"
                    alt="Photo of {{name}}"
                />
                <div class="profile-title">
                    <h1>{{name}}</h1>
                    <p>{{tagline}}</p>
                </div>
            </div>
        </header>

        <div class="width-control" role="group" aria-label="Adjust content width">
            <button
                type="button"
                class="width-btn"
                data-width-step="-1"
                aria-label="Decrease content width"
            >
                &minus;
            </button>
            <button
                type="button"
                class="width-btn"
                data-width-step="1"
                aria-label="Increase content width"
            >
                +
            </button>
        </div>

        <nav>
            <a href="/">Home</a>
            <a href="/about">About me</a>
            <a href="/projects">Notable projects</a>
            <a href="/books">Favorite books</a>
        </nav>

        <main>{{body}}</main>

        <footer>
            <p>
                &copy; <time datetime="{{year}}">{{year}}</time> {{name}}
                &middot; <a href="{{github}}">GitHub</a> &middot;
                <a href="mailto:{{email}}">Email</a> &middot;
                <a href="{{linkedin}}"> LinkedIn</a>
            </p>
        </footer>

        <script>
            (function () {
                var root = document.documentElement;
                var MIN = 30,
                    MAX = 120,
                    STEP = 5,
                    DEFAULT = 90;
                var stored = parseInt(localStorage.getItem("column-width"), 10);
                var width = isNaN(stored)
                    ? DEFAULT
                    : Math.min(MAX, Math.max(MIN, stored));
                function apply() {
                    root.style.setProperty("--column-width", width + "ch");
                }
                if (!isNaN(stored)) apply();
                document
                    .querySelectorAll("[data-width-step]")
                    .forEach(function (btn) {
                        btn.addEventListener("click", function () {
                            var step =
                                parseInt(btn.getAttribute("data-width-step"), 10) *
                                STEP;
                            width = Math.min(MAX, Math.max(MIN, width + step));
                            apply();
                            localStorage.setItem("column-width", width);
                        });
                    });
            })();
        </script>
    </body>
</html>
